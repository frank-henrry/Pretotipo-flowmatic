version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowmatic_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: flowmatic_backend
    restart: always
    ports:
      - "8010:8000" # Mapeamos puerto 8010 externo al 8000 interno
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: flowmatic_frontend
    restart: always
    ports:
      - "5173:80" # Mapeamos puerto 5173 externo al 80 interno (Nginx)
    depends_on:
      - backend

volumes:
  postgres_data:
