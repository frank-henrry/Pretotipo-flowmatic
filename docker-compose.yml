version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowmatic_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No exponemos el puerto 5432 al exterior por seguridad

  backend:
    build: ./backend
    container_name: flowmatic_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: flowmatic_frontend
    restart: always
    ports:
      - "80:80" # Cambiamos al puerto 80 para producción
    depends_on:
      - backend

volumes:
  postgres_data:
